name: build .NET and deploy

on:
  push:
    branches: 
      - main
      - devops/ci-cd
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
    # -------- 1 PHASE --------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
      
      - name: Publish
        run: dotnet publish -c Release
      
    # -------- 2 PHASE --------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/career-point:latest .
      
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/career-point:latest
    
    # -------- 3 PHASE --------

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 49478
          script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/career-point:latest
            docker stop careerpoint || true
            docker rm careerpoint || true
            docker run -d -p 8070:8070 --name careerpoint --network careerpointdocker_default ${{ secrets.DOCKER_HUB_USERNAME }}/career-point:latest


